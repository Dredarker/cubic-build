<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Cubic Build</title>
	<style>
		body {
			margin: 0px;
		}
		canvas {
			background: #ffffff;
			display: block;
			margin: auto;
			position: absolute;
			top: 0px;
			left: 0px;
			z-index: 0;
		}
		#chat {
			word-wrap: break-word;
			background: #777777aa;
			margin: 8px;
			color: white;
			position: absolute;
			bottom: 0px;
			left: 0px;
			width: 500px;
			height: 300px;
		}
		#chatBox {
			background: #777777aa;
			color: white;
			width: 100%;
			height: 264px;
			overflow-x: hidden;
			overflow-y: auto;
		}
		#chatInput {
			border-style: hidden;
			background: #777777;
			color: white;
			width: 400px;
			height: 24px;
		}
		div {
			display: block;
			position: relative;
		}
		.inline {display: inline-block}
		.block {display: block}
		#menu {
			background: #77777777;
			position: absolute;
			border: #404040 solid 4px;
			display: inline-flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
		}
		#errorPage {
			word-wrap: break-word;
			background: #77202077;
			position: absolute;
			border: #401010 solid 4px;
			display: inline-flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
		}
		#inventory {
			background: #777777aa;
			position: absolute;
			margin: 8px;
			bottom: 0px;
			right: 0px;
			width: 200px;
			height: 60px;
		}
		p {
			font-family: arial;
			margin-block-start: 2px;
			margin-block-end: 2px;
		}
		a {font-family: arial;}
		i {font-family: arial;}
		b {font-family: arial;}
		#title {
			font-size: 48px;
		}
		.smallTitle {
			font-size: 36px;
		}
		.colume {
			text-align: center;
			margin: 32px;
		}
		.item {
			cursor: pointer;
			font-size: 30px;
		}
  </style>
</head>
<body>
	<div id="game">
		<canvas id="gameCanvas"></canvas>
		<div id="chat">
			<div id="chatBox"></div>
			<input id="chatInput"/>
		</div>
		<div id="inventory">
			<p class="inline item" item="box">Box</p>
			<p class="inline item" item="platform">Platform</p>
		</div>
	</div>
	<div id="menu">
		<b id="title">Cubic Build</b>
		<i id="version">v0.0</i>
		<div class="block">
			<div class="block colume">
				<div class="block">
					<div class="block">
						<input id="nicknameInput"/><input type="button" onclick="runGame()" value="Play"/>
					</div>
					<div class="block">
						<b style="color:red" id="error"></b>
					</div>
				</div>
				<div class="block" style="margin: 6px">
					<b>COLORS</b>
				</div>
				<div id="colorEdit" class="block">
					<div class="inline">
						<input id="colorHairInput" type="color"/><p>Hair</p>
					</div>
					<div class="inline">
						<input id="colorSkinInput" type="color"/><p>Skin</p>
					</div>
					<div class="inline">
						<input id="colorBodyInput" type="color"/><p>Body</p>
					</div>
					<div class="inline">
						<input id="colorLegInput" type="color"/><p>Leg</p>
					</div>
					<div class="inline">
						<input id="colorFootInput" type="color"/><p>Foot</p>
					</div>
				</div>
			</div>
			<div class="block colume">
				<p>Our Community</p>
				<a href="https://discord.gg/eQyezGmJHT">Discord</a>
			</div>
		</div>
	</div>
	<div id="errorPage">
	</div>
</body>

<script>
let maxfbss = 0;
nicknameInput.placeholder = "Nickname";
var gameVersion = [0, 2, 2];
version.innerHTML = "v"+gameVersion.join(".");

game.style.display = "none";
menu.style.width = "500px";
menu.style.height = "400px";
menu.style.left = (document.documentElement.clientWidth/2 - parseInt(menu.style.width)/2)+"px";
menu.style.top = (document.documentElement.clientHeight/2 - parseInt(menu.style.height)/2)+"px";

errorPage.style.display = "none";
errorPage.style.width = "400px";
errorPage.style.padding = "32px"

document.getElementById("inventory").style.bottom = -document.documentElement.clientHeight+"px";

chatInput.maxLength = 250;
nicknameInput.maxLength = 20;

function runGame() {
if (!(nicknameInput.value.length >= 3 && nicknameInput.value.length <= 20)) {
	error.innerHTML = "Nickname's length need be 3 - 20";
	return;
}

for (let elem of document.getElementsByClassName("item")) {
	elem.onclick = () => {
		myData.objtype = elem.getAttribute("item");
	};
}

menu.style.display = "none";

const images = {};
images.new = (name, source) => {
	images[name] = new Image();
	images[name].src = images.source+source;
}
const sounds = {};
sounds.new = (name, source) => {
	sounds[name] = {};
	sounds[name].src = sounds.source+source;
}

const helpBook = [
	"Command Help:",
	"/run (code) - executes code in server (A)",
	"/crun (code) - executes code in client",
	"/pass (password) - sets console password",
	"/mode (mode) ... - selects console mode (A)",
	"/tp <(pos)|[(nickname) (nickname|pos)]> - teleports you/player to position/player (A)",
	"/kick (nickname) - kicks player (A)",
	"--------------------------------------------------------------------",
	"A - Requests console password",
];

const myData = {id: "", x: 0, y: 0, width: 0, height: 0, syncx: 0, syncy: 0, visx: 0, visy: 0, esp: false, objtype: "box"};
const myObject = {};

const sourceid = "2c1c9eb501347de4b1ee8a0880fdf4946654c4ea";
images.source = `https://raw.githubusercontent.com/Dredarker/game-server/${sourceid}/client/img/`;
images.new("player_body", "body.png");
images.new("player_face", "face.png");
images.new("player_arm", "arm.png");
images.new("player_foot", "foot.png");
images.new("player_hair", "hair.png");
images.new("player_hand", "hand.png");
images.new("player_head", "head.png");
images.new("player_leg", "leg.png");
sounds.source = `https://raw.githubusercontent.com/Dredarker/game-server/${sourceid}/client/snd/`;

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.focused = true;
document.getElementById("chatInput").onfocus = (e) => {canvas.focused = false};
document.getElementById("chatInput").onblur = (e) => {canvas.focused = true};

const keys = {};
const camera = {x: 0, y: 0};
let console_password = localStorage.getItem("console_password") ?? "";
let console_mode = {mode: ""};

let myframes = 0;
let fbss = 0;

let mouseX = 0;
let mouseY = 0;
document.onmousemove = () => {mouseX = event.clientX; mouseY = event.clientY}

let objects = new Map();
let oldObjects = new Map();

document.addEventListener("keydown", (e) => {
	if (!canvas.focused) return;
	keys[e.code] = true;
});
document.addEventListener("keyup", e => keys[e.code] = false);

document.addEventListener("keydown", (event) => {
	if (event.code == "Enter") {
		if (!canvas.focused) {
			let inputvalue = document.getElementById("chatInput").value;
			if (inputvalue === "") return;
			let args = inputvalue.split(" ");
			if (args[0] == "/run") {
				sendtows({type: "console", msg: inputvalue.slice(5), password: console_password})
			} else if (args[0] == "/crun") {
				let result;
				try {result = eval(inputvalue.slice(6))} catch (err) {result = err}
				messageToChat(result);
			} else if (args[0] == "/pass") {
				console_password = inputvalue.slice(6);
				localStorage.setItem("console_password", console_password);
				messageToChat("Set console password to "+console_password, "#aaaaaa");
			} else if (args[0] == "/mode") {
				console_mode.mode = args[1] ?? "";
				if (console_mode.mode == "") {
					messageToChat("Avaliable modes:", "#aaaaaa");
					messageToChat("• build (width) (height) (objmode) (objtype)", "#aaaaaa");
					messageToChat("-------------------------------------", "#aaaaaa");
					messageToChat("Also emtped mode", "#aaaaaa");
				} else {
					if (args[1] == "build") {
						console_mode.width = args[2];
						console_mode.height = args[3];
						console_mode.objmode = args[4];
						console_mode.objtype = args[5];
					}
					messageToChat(`Set console mode to ${console_mode.mode}`, "#aaaaaa")
				}
			} else if (args[0] == "/tp") {
				let cmd;
				if (!isNaN(Number(args[1]))) {cmd = `
					objects.get(myid).x = ${args[1]}; objects.get(myid).y = ${args[2]}
				`} else if (!isNaN(Number(args[2]))) {cmd = `
					objects.forEach((obj, id) => {if (obj.nickname == "${args[1]}") obj.x = ${args[2]}, obj.y = ${args[3]}})
				`} else {cmd = `
					let obj1;
					objects.forEach((obj, id) => {if (obj.nickname == "${args[1]}") obj1 = obj})
					objects.forEach((obj, id) => {if (obj.nickname == "${args[2]}") {obj1.x = obj.x; obj1.y = obj.y;}})
				`};
				sendtows({type: "console", msg: cmd, password: console_password})
			} else if (args[0] == "/kick") {
				sendtows({type: "console", msg: `
					clients.forEach((client, id) => {if (client.nickname == "${args[1]}") client.ws.terminate(4021)})
				`, password: console_password})
			} else if (args[0] == "/...") {
				sendtows({type: "console", msg: `
				`, password: console_password})
			} else if (args[0] == "/help") {
				for (let textline of helpBook) {messageToChat(textline)}
			} else if (inputvalue.startsWith('/')) {
				messageToChat(`Invalid/Unknown command "${inputvalue}"`, "red")
			} else {
				sendtows({type: "msg", text: inputvalue})
			}
			document.getElementById("chatInput").value = "";
		} else {chatInput.focus()}
	}
});

const ws = new WebSocket("wss://game-server-3k6f.onrender.com/");
ws.onopen = (e) => {
	sendtows({
		type: "join",
		nickname: document.getElementById("nicknameInput").value,
		color: {
			hair: colorHairInput.value,
			skin: colorSkinInput.value,
			body: colorBodyInput.value,
			leg: colorLegInput.value,
			foot: colorFootInput.value,
		},
	});
	game.style.display = "block";
	gameLoop();
};
ws.onmessage = (event) => {
	let json = JSON.parse(event.data);
	try {
		if (json.type == "init") {
			myData.id = json.clientId;
			myData.nickname = json.nickname;
		} else if (json.type == "sync") {
			maxfbss = fbss;
			fbss = 0;
			if (objects.size>0) {
				oldObjects = objects;
				objects = new Map(Object.entries(json.world));
			} else {
				oldObjects = new Map(Object.entries(json.world));
				objects = oldObjects;
			}
			objects.forEach((obj, id) => {
				if (id === myData.id) {
					myData.x = obj.x;
					myData.y = obj.y;
					myData.width = obj.width;
					myData.height = obj.height;
				}
			});
		} else if (json.type == "msg") {
			messageToChat(`${json.from ? json.from+": " : ""} ${json.text}`);
		};
	} catch (err) {console.error(err)};
};
ws.onclose = (event) => {
	showError("Disconnected", "You are disconnected from game, "+event.code+". Restart page.")
};

gameCanvas.oncontextmenu = () => {
	if (console_mode.mode === "build") {
		let x = camera.x + mouseX;
		let y = camera.y + mouseY;
		let minimal = Math.min(console_mode.width, console_mode.width);
		x = Math.floor(x/minimal)*minimal;
		y = Math.floor(y/minimal)*minimal;
		sendtows({
			type: "console",
			msg: `objects.set(Math.floor(Math.random() * 100000), new Obj(${x}, ${y}, ${console_mode.width}, ${console_mode.height}, ${console_mode.objmode}, ${console_mode.objtype}))`,
			password: console_password
		});
	} else {
		sendtows({
			type: "i_build",
			objtype: myData.objtype
		});
	};
	return false;
};

gameCanvas.onclick = () => {
	if (console_mode.mode === "build") {
		objects.forEach((obj, id) => {
			if (posInObj(camera.x+mouseX, camera.y+mouseY, obj)) {
				console.log(id);
				sendtows({
					type: "console",
					msg: `objects.delete(${id})`,
					password: console_password
				});
			}
		});
	} else {
		sendtows({type: "i_break"});
	}
};

function lerp(val1, val2, factor) {// спасибо Who?
	return val1 + (val2 - val1) * factor;
}

function posInObj(x, y, obj) {
	return (
		x < obj.x + obj.width &&
		x > obj.x &&
		y < obj.y + obj.height &&
		y > obj.y
	)
}

function getDistance(x1, y1, x2, y2) {
	return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
}

function messageToChat(text, color = "white") {
	let message = document.createElement("p");
	message.style.color = color;
	message.textContent = text;
	document.getElementById("chatBox").append(message);
	chatBox.scrollTop = 999999999;
}

function sendtows(json) {
	if (ws.readyState != 1) return;
	ws.send(JSON.stringify(json));
}

function drawImage(image, x, y, width = 0, height = 0, rotation, color = "#000000", isClipped = true, isCenter = false, spritex = null, spritey = null) {
	ctx.save();
	ctx.translate(x, y);
	//ctx.translate(-ax, -y);
	ctx.rotate((Math.PI/180)*rotation);
	ctx.scale(isClipped ? -1 : 1, 1);
	if (isCenter) {
		spritex += -width/2;
		spritey += -height/2;
	}
	try {
		if (width && height) {ctx.drawImage(image, spritex, spritey, width, height)} else {ctx.drawImage(image, spritex, spritey)};
		ctx.fillStyle = color;
		ctx.fillRect(spritex, spritey, width, height);
	} catch (err) {
		ctx.fillStyle = "red";
		ctx.fillRect(x, y, width, height);
	};
	ctx.restore();
}

function update() {
	myframes++;
	fbss++;
	canvas.width = document.documentElement.clientWidth;
	canvas.height = document.documentElement.clientHeight;
	document.getElementById("chat").style.bottom = -document.getElementById("gameCanvas").height+"px";
	sendtows({
		type: "sync",
		keys,
		mouseX: mouseX-canvas.width/2,
		mouseY: mouseY-canvas.height/2,
	});
	objects.forEach((obj, id) => {
		if (id === myData.id) {
			camera.x += (((myData.visx+obj.width/2)-canvas.width/2)-camera.x)/6;
			camera.y += (((myData.visy+obj.height/2)-canvas.height/2)-camera.y)/6;
		}
	});
}

function draw() {
	ctx.clearRect(0, 0, canvas.width, canvas.height);

	objects.forEach((obj, id) => {
		let oldObj = oldObjects.get(id) ?? {};
		let visualObj = {x: 0, y: 0};
		if (!oldObj.x) oldObj.x = 0;
		if (!oldObj.y) oldObj.y = 0;
		visualObj.x = lerp(oldObj.x, obj.x, Math.min(fbss/maxfbss, 1));
		visualObj.y = lerp(oldObj.y, obj.y, Math.min(fbss/maxfbss, 1));
		if (obj.type === "player") {
			if (id === myData.id) {
				myData.visx = visualObj.x;
				myData.visy = visualObj.y;
			} else if (myData.esp) {
				let distance = getDistance(myData.x, myData.y, obj.x, obj.y)/100;
				ctx.save();
				ctx.translate(canvas.width/2, canvas.height/2);
				ctx.rotate(Math.atan2(obj.y-myData.y, obj.x-myData.x));
				ctx.beginPath();
				ctx.moveTo(60+distance, 0);
				ctx.lineTo(40+distance, 10);
				ctx.lineTo(40+distance, -10);
				ctx.closePath();
				ctx.fill();
				ctx.restore();
			}
			if (obj.vx > 0) {obj.isClipped = true} else {obj.isClipped = false};
			let vox = visualObj.x-camera.x+obj.width/2
			let voy = visualObj.y-camera.y+obj.height/2
			let hw = obj.width;
			let hh = obj.height*0.3;
			let hsy = -obj.width-4;

			let bw = obj.width*0.8;
			let bh = obj.height*0.4;

			let lw = obj.width*0.4;
			let lh = obj.height*0.34;

			let fw = obj.width*0.65;
			let fh = obj.height*0.1;

			let aw = obj.width*0.35;
			let ah = obj.height*0.35;

			let hdw = obj.width*0.35;
			let hdh = obj.height*0.55;

			let rotik = 0;
			let rotik2 = 0;

			if (obj.onGround) {
				rotik = Math.sin(myframes/4)*obj.vx*3;
				rotik2 = Math.sin((myframes+2)/4)*obj.vx*3;
			} else {
				rotik = Math.sin(myframes/20)*(obj.vx+obj.vy+10);
				rotik2 = Math.sin((myframes+10)/20)*(obj.vx+obj.vy+10);
			}

			let transperent = "e0";
			drawImage(images.player_arm, vox, voy-14, aw, ah, -rotik2, obj.color.body+transperent, obj.isClipped, true, 5, 12);
			drawImage(images.player_hand, vox, voy-14, hdw, hdh, -rotik2, obj.color.skin+transperent, obj.isClipped, true, 5, 6);
			drawImage(images.player_leg, vox, voy, lw, lh, rotik+obj.vx, obj.color.leg+transperent, obj.isClipped, true, -2, -hsy-2);
			drawImage(images.player_foot, vox, voy, fw, fh, rotik+obj.vx, obj.color.foot+transperent, obj.isClipped, true, -3, -hsy+8);
			drawImage(images.player_body, vox, voy, bw, bh, obj.vx, obj.color.body+transperent, obj.isClipped, true, 1, -4);
			drawImage(images.player_head, vox, voy, hw, hh, obj.vx, obj.color.skin+transperent, obj.isClipped, true, 0, hsy);
			drawImage(images.player_hair, vox, voy, hw, hh, obj.vx, obj.color.hair+transperent, obj.isClipped, true, 0, hsy);
			drawImage(images.player_face, vox, voy, hw, hh, obj.vx, "#00000000", obj.isClipped, true, 0, hsy);
			drawImage(images.player_leg, vox, voy, lw, lh, -rotik+obj.vx, obj.color.leg+transperent, obj.isClipped, true, 6, -hsy-2);
			drawImage(images.player_foot, vox, voy, fw, fh, -rotik+obj.vx, obj.color.foot+transperent, obj.isClipped, true, 3, -hsy+8);
			drawImage(images.player_arm, vox, voy-14, aw, ah, rotik2, obj.color.body+transperent, obj.isClipped, true, 5, 12);
			drawImage(images.player_hand, vox, voy-14, hdw, hdh, rotik2, obj.color.skin+transperent, obj.isClipped, true, 5, 6);

			ctx.fillStyle = obj.color;
			ctx.font = "20px arial";
			ctx.textAlign = "center";
			ctx.fillText(obj.nickname, (visualObj.x+obj.width/2)-camera.x, (visualObj.y-10)-camera.y)
		} else if (obj.type === "text") {
			ctx.fillStyle = obj.textColor;
			ctx.font = "20px arial";
			ctx.textAlign = "center";
			ctx.fillText(obj.text, visualObj.x-camera.x, visualObj.y-camera.y)
		} else {
			ctx.fillStyle = obj.color;
			ctx.fillRect(visualObj.x-camera.x, visualObj.y-camera.y, obj.width, obj.height);
		}
	});

	if (console_mode.mode == "build") {
		let x = mouseX;
		let y = mouseY;
		/*
		let x = Math.floor(mouseX / console_mode.width) * console_mode.width;
		let y = Math.floor(mouseY / console_mode.height) * console_mode.height;
		*/

		ctx.fillStyle = "#000000";
		ctx.fillRect(x, y, 10, 10);
		ctx.fillStyle = "#00000040";
		ctx.fillRect(x+10, y+10, console_mode.width/2, console_mode.height/2);
	}
}

function gameLoop() {
	update();
	draw();
	requestAnimationFrame(gameLoop);
}
}

function showError(title, text) {
	game.style.display = "none";
	errorPage.innerHTML = `<b class="smallTitle">${title}</b><p>${text}</p>`;
	errorPage.style.display = "inline-flex";
	errorPage.style.left = (document.documentElement.clientWidth/2 - parseInt(errorPage.clientWidth)/2)+"px";
	errorPage.style.top = (document.documentElement.clientHeight/2 - parseInt(errorPage.clientHeight)/2)+"px";
}
</script>
</html>
